version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: ts-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: hrcopilot
      MONGO_INITDB_ROOT_PASSWORD: hrcopilot123
      MONGO_INITDB_DATABASE: talentsense
    healthcheck:
      test: ["CMD", "mongosh", "-u", "hrcopilot", "-p", "hrcopilot123", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - talentsense-net

  redis:
    image: redis:7-alpine
    container_name: ts-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass hrcopilot123
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "hrcopilot123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - talentsense-net

  minio:
    image: minio/minio:latest
    container_name: ts-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: hrcopilot
      MINIO_ROOT_PASSWORD: hrcopilot123
    command: server /data --console-address ":9001"
    networks:
      - talentsense-net

  minio-init:
    image: minio/mc:latest
    container_name: ts-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 hrcopilot hrcopilot123 2>/dev/null; do
        echo '等待 MinIO 启动...';
        sleep 2;
      done;
      mc mb local/resumes --ignore-existing;
      mc mb local/milvus-bucket --ignore-existing;
      echo 'MinIO bucket 初始化完成';
      exit 0;
      "
    networks:
      - talentsense-net

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: ts-milvus-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - talentsense-net

  milvus:
    image: milvusdb/milvus:v2.4.17
    container_name: ts-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: hrcopilot
      MINIO_SECRET_ACCESS_KEY: hrcopilot123
      MINIO_BUCKET_NAME: milvus-bucket
      MINIO_USE_SSL: "false"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - talentsense-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: talentsense-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=${MONGO_DB:-talentsense}
      - REDIS_URL=redis://redis:6379/0
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - MILVUS_COLLECTION=${MILVUS_COLLECTION:-resumes}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-resumes}
      - MINIO_SECURE=false
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - LLM_MODEL=${LLM_MODEL:-qwen-plus}
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production-please}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - BGE_M3_PATH=/app/models/bge-m3
      - BGE_RERANKER_PATH=/app/models/bge-reranker-v2-m3
      - HYBRID_DENSE_WEIGHT=1.0
      - HYBRID_SPARSE_WEIGHT=0.7
      - RETRIEVE_TOP_K=20
      - RERANK_TOP_K=10
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@test.com}
      - DEBUG=false
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - model_data:/app/models
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - talentsense-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: talentsense-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - talentsense-net

volumes:
  mongo_data:
  redis_data:
  minio_data:
  etcd_data:
  milvus_data:
  model_data:
  backend_logs:

networks:
  talentsense-net:
    driver: bridge
